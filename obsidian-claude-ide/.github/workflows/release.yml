name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build -- --production

      - uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json

      - run: gh release create "$GITHUB_REF_NAME" main.js manifest.json --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}
